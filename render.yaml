services:
  - type: web
    name: wjdgus-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_API_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          name: wjdgus-redis
          type: redis
          property: connectionString

  - type: redis
    name: wjdgus-redis
    plan: free
    ipAllowList: []
