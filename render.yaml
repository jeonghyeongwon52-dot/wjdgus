services:
  - type: web
    name: wjdgus-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_API_KEY
        generateValue: true
      # REDIS_URL이 없으면 서버는 로컬 메모리를 사용하여 단일 인스턴스로 작동합니다.
